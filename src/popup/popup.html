<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tubeless Quick Settings</title>
    <link rel="icon" href="../../assets/icon.png" />
    <link rel="stylesheet" href="popup.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body class="modern loading">
    <main class="container">
        <header class="header">
            <div class="brand">
                <img class="brand-icon" src="../../assets/icon.png" alt="Tubeless" />
                <div class="brand-text">
                    <h1 data-t="brandName" data-t-title="brandHint">Tubeless</h1>
                    <div id="status" class="status"></div>
                </div>
            </div>
            <div class="header-actions">
                <button id="deepWorkBtn" class="icon-btn" data-t-title="deepWorkHint">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <circle cx="12" cy="12" r="6" />
                        <circle cx="12" cy="12" r="2" />
                    </svg>
                </button>
                <div class="download-container">
                    <div id="qualityDropdown" class="dropdown quality-dropdown">
                        <div id="qualityMenuBtn" class="quality-btn" disabled>
                            <span id="qualityText" data-t="loading">Loading...</span>
                            <button id="playlistToggleBtn" class="playlist-toggle" data-t-title="playlistMode"
                                style="display: none;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="8" y1="6" x2="21" y2="6"></line>
                                    <line x1="8" y1="12" x2="21" y2="12"></line>
                                    <line x1="8" y1="18" x2="21" y2="18"></line>
                                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                        <div id="qualityDropdownContent" class="dropdown-content">
                            <div class="category-header" data-t="videoQualities">Video Qualities</div>
                            <div id="videoQualitiesList">
                            </div>

                            <div style="height: 1px; background: var(--border-color); margin: 4px 0;"></div>

                            <div class="category-header" data-t="audioOptions">Audio Options</div>
                            <div id="audioQualitiesList">
                            </div>

                            <div style="height: 1px; background: var(--border-color); margin: 4px 0;"></div>

                            <div class="category-header" data-t="subtitles">Subtitles</div>
                            <div id="subtitlesList">
                            </div>

                            <div style="height: 1px; background: var(--border-color); margin: 4px 0;"></div>

                            <div class="category-header" data-t="thumbnails">Thumbnails</div>
                            <div id="thumbnailsList">
                            </div>
                        </div>
                    </div>

                    <button id="ytPlusDownloadBtn" class="icon-btn" data-t-title="download" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                    </button>
                </div>
                <div class="dropdown">
                    <button id="moreMenuBtn" class="icon-btn" data-t-title="moreHint">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="5" r="1" />
                            <circle cx="12" cy="12" r="1" />
                            <circle cx="12" cy="19" r="1" />
                        </svg>
                    </button>
                    <div id="moreMenuDropdown" class="dropdown-content">
                        <button id="languageToggle" class="menu-item" data-t="language" data-t-title="language">Language</button>
                        <button id="themeMenuBtn" class="menu-item" data-t="theme" data-t-title="themeHint">Theme</button>
                        <button id="resetSettingsBtn" class="menu-item" data-t="resetDefaults" data-t-title="resetDefaultsHint">Restore Defaults</button>
                        <button id="openOptionsBtn" class="menu-item" data-t="settings" data-t-title="optionsHint">Settings</button>

                    </div>
                    <div id="themeMenuDropdown" class="dropdown-content">
                        <button id="themeBackBtn" class="menu-item category-header"
                            style="cursor:pointer; display:flex; align-items:center; gap:8px; border-bottom: 1px solid var(--border-color); margin-bottom: 4px;">
                            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5"
                                fill="none" style="transform: scaleX(-1);">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                            <span data-t="theme">Theme</span>
                        </button>
                        <button class="menu-item theme-opt" data-theme-val="light" data-t="lightMode">Light</button>
                        <button class="menu-item theme-opt" data-theme-val="dark" data-t="darkMode">Dark</button>
                    </div>
                    <div id="languageMenuDropdown" class="dropdown-content">
                        <button id="langBackBtn" class="menu-item category-header"
                            style="cursor:pointer; display:flex; align-items:center; gap:8px; border-bottom: 1px solid var(--border-color); margin-bottom: 4px;">
                            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5"
                                fill="none" style="transform: scaleX(-1);">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                            <span data-t="language">Language</span>
                        </button>
                        <button class="menu-item lang-opt" data-lang="en">English</button>
                        <button class="menu-item lang-opt" data-lang="ar">العربية</button>
                        <button class="menu-item lang-opt" data-lang="fr">Français</button>
                        <button class="menu-item lang-opt" data-lang="de">Deutsch</button>
                        <button class="menu-item lang-opt" data-lang="es">Español</button>
                        <button class="menu-item lang-opt" data-lang="ja">日本語</button>
                        <button class="menu-item lang-opt" data-lang="zh">中文</button>
                        <button class="menu-item lang-opt" data-lang="pt">Português</button>
                        <button class="menu-item lang-opt" data-lang="ru">Русский</button>
                        <button class="menu-item lang-opt" data-lang="ko">한국어</button>
                        <button class="menu-item lang-opt" data-lang="tr">Türkçe</button>
                        <button class="menu-item lang-opt" data-lang="hi">हिन्दी</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="scroll-area">
            <section class="section">
                <div class="settings-grid">
                    <label class="setting-card">
                        <input id="showDislikes" type="checkbox" />
                        <div class="card-content">
                            <span class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.33 2.33 0 0 1 22 4.33V9a2.33 2.33 0 0 1-2.33 2.33H17Z" />
                                </svg>
                            </span>
                            <span class="label" data-t="showDislikesGrid">Return Dislikes</span>
                        </div>
                    </label>
                    <label class="setting-card">
                        <input id="forceCinemaMode" type="checkbox" />
                        <div class="card-content">
                            <span class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="20" height="15" x="2" y="3" rx="2" />
                                    <path d="M2 12h20" />
                                    <path d="M7 18h10" />
                                </svg>
                            </span>
                            <span class="label" data-t="cinemaModeGrid">Cinema Mode</span>
                        </div>
                    </label>
                    <label class="setting-card">
                        <input id="loopVideo" type="checkbox" />
                        <div class="card-content">
                            <span class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m17 2 4 4-4 4" />
                                    <path d="M3 11v-1a4 4 0 0 1 4-4h14" />
                                    <path d="m7 22-4-4 4-4" />
                                    <path d="M21 13v1a4 4 0 0 1-4 4H3" />
                                </svg>
                            </span>
                            <span class="label" data-t="autoReplayGrid">Auto Replay</span>
                        </div>
                    </label>
                    <label class="setting-card">
                        <input id="hideSidebarRecommendations" type="checkbox" />
                        <div class="card-content">
                            <span class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="18" height="18" x="3" y="3" rx="2" />
                                    <path d="M9 3v18" />
                                </svg>
                            </span>
                            <span class="label" data-t="hideSidebarGrid">Hide Sidebar</span>
                        </div>
                    </label>
                </div>
            </section>

            <section class="section">
                <h2 class="section-title" data-t="smartQualityLock">Smart Quality Lock</h2>
                <div class="quality-lock-container"
                    style="background: var(--card-bg); border-radius: 12px; padding: 12px; display: flex; align-items: center; justify-content: space-between;">
                    <span class="label" data-t="preferredQuality"
                        style="font-size: 13px; font-weight: 500; opacity: 0.8;">Preferred Quality</span>
                    <div class="dropdown">
                        <button id="smartQualityLockBtn" class="quality-btn"
                            style="min-width: 80px; height: 32px; padding: 0 10px; font-size: 11px; font-weight: 600; border-radius: 12px; background: var(--bg-color); border: 1px solid var(--border-color);">
                            <span id="smartQualityLockText" data-t="autoQuality">Auto</span>
                        </button>
                        <div id="smartQualityLockDropdown" class="dropdown-content"
                            style="min-width: 180px; max-height: 160px; overflow-y: auto; overscroll-behavior: contain;">
                            <button class="menu-item quality-lock-opt selected" data-quality="auto"
                                data-t="autoQuality">Auto</button>
                            <button class="menu-item quality-lock-opt" data-quality="4320p">4320p <span class="badge"
                                    style="background:var(--accent-color); color:white;">8K</span></button>
                            <button class="menu-item quality-lock-opt" data-quality="2160p">2160p <span class="badge"
                                    style="background:var(--accent-color); color:white;">4K</span></button>
                            <button class="menu-item quality-lock-opt" data-quality="1440p">1440p <span
                                    class="badge">2K</span></button>
                            <button class="menu-item quality-lock-opt" data-quality="1080p">1080p <span
                                    class="badge">HD</span></button>
                            <button class="menu-item quality-lock-opt" data-quality="720p">720p</button>
                            <button class="menu-item quality-lock-opt" data-quality="480p">480p</button>
                            <button class="menu-item quality-lock-opt" data-quality="360p">360p</button>
                            <button class="menu-item quality-lock-opt" data-quality="240p">240p</button>
                            <button class="menu-item quality-lock-opt" data-quality="144p">144p</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="section">
                <div class="section-header"
                    style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                    <h2 class="section-title" data-t="playbackSpeed" style="margin-bottom: 0;">Playback Speed</h2>
                    <button id="resetSpeedBtn" class="reset-icon-btn" data-t-title="resetSpeedHint">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                            <path d="M3 3v5h5" />
                        </svg>
                    </button>
                </div>
                <div class="speed-control">
                    <div class="speed-btn-group">
                        <button class="speed-btn" data-speed="0.1">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 2px;">
                                <rect width="24" height="24" rx="4" fill="#FF0000" />
                                <path
                                    d="M7 18V6H13C15.2091 6 17 7.79086 17 10C17 12.2091 15.2091 14 13 14H10V18H7ZM10 11H13C13.5523 11 14 10.5523 14 10C14 9.44772 13.5523 9 13 9H10V11Z"
                                    fill="white" />
                            </svg>
                            0.1x
                        </button>
                        <button class="speed-btn" data-speed="1">1x</button>
                        <button class="speed-btn" data-speed="1.5">1.5x</button>
                        <button class="speed-btn" data-speed="2">2x</button>
                        <button class="speed-btn" data-speed="3">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 2px;">
                                <rect width="24" height="24" rx="4" fill="#FF0000" />
                                <path
                                    d="M7 18V6H13C15.2091 6 17 7.79086 17 10C17 12.2091 15.2091 14 13 14H10V18H7ZM10 11H13C13.5523 11 14 10.5523 14 10C14 9.44772 13.5523 9 13 9H10V11Z"
                                    fill="white" />
                            </svg>
                            3x
                        </button>
                    </div>
                    <div class="custom-speed">
                        <input type="range" id="speedSlider" min="0.1" max="3" step="0.05" value="1" />
                        <span id="speedValue" class="speed-badge">1x</span>
                    </div>
                </div>
            </section>



            <section class="section">
                <h2 class="section-title" data-t="adBlocking">Ad Blocking</h2>
                <div class="settings-list">
                    <label class="setting-item">
                        <div class="item-info">
                            <span class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="9" y1="9" x2="15" y2="15"></line>
                                    <line x1="15" y1="9" x2="9" y2="15"></line>
                                </svg>
                            </span>
                            <div class="text">
                                <span class="label" data-t="adBlockEnabled">Ad Blocking</span>
                                <span class="desc" data-t="adBlockDesc">Zero-latency ad removal</span>
                            </div>
                        </div>
                        <div class="switch">
                            <input id="adBlockEnabled" type="checkbox" />
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>
            </section>

            <section class="section">
                <h2 class="section-title" data-t="visualsLayout">Visuals & Layout</h2>
                <div class="settings-list">
                    <label class="setting-item">
                        <div class="item-info">
                            <span class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                    <polyline points="9 22 9 12 15 12 15 22" />
                                </svg>
                            </span>
                            <div class="text">
                                <span class="label" data-t="hideHome">Hide Home Feed</span>
                                <span class="desc" data-t="hideHomeDesc">Stop the scrolling loop</span>
                            </div>
                        </div>
                        <div class="switch">
                            <input id="hideHomeFeed" type="checkbox" />
                            <span class="slider"></span>
                        </div>
                    </label>

                    <label class="setting-item">
                        <div class="item-info">
                            <span class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="14" height="20" x="5" y="2" rx="2" ry="2" />
                                    <path d="M12 18h.01" />
                                </svg>
                            </span>
                            <div class="text">
                                <span class="label" data-t="hideShorts">Hide Shorts/Reels</span>
                                <span class="desc" data-t="cleanFeed">Clean up your feed</span>
                            </div>
                        </div>
                        <div class="switch">
                            <input id="hideShorts" type="checkbox" />
                            <span class="slider"></span>
                        </div>
                    </label>

                    <label class="setting-item">
                        <div class="item-info">
                            <span class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m21 21-4.3-4.3" />
                                    <circle cx="11" cy="11" r="8" />
                                </svg>
                            </span>
                            <div class="text">
                                <span class="label" data-t="hideShortsSearch">Hide Shorts from Search</span>
                                <span class="desc" data-t="focusSearch">Keep search results clean</span>
                            </div>
                        </div>
                        <div class="switch">
                            <input id="hideShortsSearch" type="checkbox" />
                            <span class="slider"></span>
                        </div>
                    </label>

                    <label class="setting-item">
                        <div class="item-info">
                            <span class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                                    <line x1="3" y1="3" x2="21" y2="21" />
                                </svg>
                            </span>
                            <div class="text">
                                <span class="label" data-t="hideComments">Hide Comments</span>
                                <span class="desc" data-t="focusVideo">Focus on the video only</span>
                            </div>
                        </div>
                        <div class="switch">
                            <input id="hideComments" type="checkbox" />
                            <span class="slider"></span>
                        </div>
                    </label>

                    <label class="setting-item">
                        <div class="item-info">
                            <span class="icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                    <line x1="3" y1="9" x2="21" y2="9" />
                                    <line x1="9" y1="21" x2="9" y2="9" />
                                </svg>
                            </span>
                            <div class="text">
                                <span class="label" data-t="hideEndscreen">Hide Endscreen Wall</span>
                                <span class="desc" data-t="removeEndscreenDesc">Block recommended videos at the
                                    end</span>
                            </div>
                        </div>
                        <div class="switch">
                            <input id="hideEndscreenRecommendations" type="checkbox" />
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>
            </section>
        </div>


    </main>
    <div id="menuBackdrop" class="menu-backdrop"></div>
    <script src="popup.js"></script>
</body>

</html>
